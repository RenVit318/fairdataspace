version: '3.8'

services:
  web:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - DATASPACE=${DATASPACE:-humanitarian}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FDP_TIMEOUT=${FDP_TIMEOUT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DASHBOARD_SPARQL_USERNAME=${DASHBOARD_SPARQL_USERNAME:-}
      - DASHBOARD_SPARQL_PASSWORD=${DASHBOARD_SPARQL_PASSWORD:-}
      - DASHBOARD_REFRESH_INTERVAL=${DASHBOARD_REFRESH_INTERVAL:-86400}
      - DASHBOARD_REPO_NAME=${DASHBOARD_REPO_NAME:-dashboard}
    volumes:
      - dashboard_data:/app/app/data/dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dashboard_data:
